      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: rule_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Aturan diskon berhasil dihapus
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}

  # ── Produk 86 ────────────────────────────────────────────────────────────────

  /tenants/{tenant_id}/products/86:
    get:
      tags: [Produk86]
      summary: Daftar produk yang di-86 hari ini
      description: |
        Mengembalikan semua produk yang ditandai tidak tersedia untuk hari ini.
        Data otomatis bersih keesokan harinya — tidak perlu manual reset.
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Daftar produk 86 hari ini
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string, example: success}
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/Product86'}
              example:
                status: success
                data:
                  - uuid: "a1b2c3d4-0000-0000-0000-000000000001"
                    product_uuid: "p1b2c3d4-0000-0000-0000-000000000001"
                    product_name: "Es Kopi Susu"
                    sku: "BEV-001"
                    reason: "Habis stok hari ini"
                    date: "2024-01-15"
