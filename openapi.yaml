          type: number
          description: Kas aktual hasil hitung fisik kasir
          example: 350000
        difference:
          type: number
          description: "Selisih = actual - expected. Positif = lebih, negatif = kurang."
          example: -25000
        denominations:
          type: object
          nullable: true
          description: "Breakdown denominasi uang. Key = nilai pecahan (string), value = jumlah lembar"
          example: {"100000": 3, "50000": 1, "20000": 0}
