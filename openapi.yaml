          required: true
          schema: { type: string, format: uuid }
          description: UUID sale
      responses:
        '200':
          description: ESC/POS bytes siap dikirim ke printer
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary


  # ── Perangkat Fisik Kasir ──────────────────────────────────────────────────

  /tenants/{tenant_id}/devices/cash-drawer/open:
    get:
      tags: [Devices]
      summary: Buka laci kas (ESC/POS bytes)
      description: |
        Mengembalikan raw ESC/POS bytes perintah `ESC p` untuk membuka laci kas
        yang terhubung ke port RJ11 printer.

        Android mengirim bytes ini langsung ke socket printer setelah transaksi
        tunai berhasil. Endpoint ini tidak otomatis dipanggil — app yang mengatur
        kapan memanggilnya.

        **Perintah yang dikirim:**
        ```
        ESC @         — init printer
        ESC p 0 25 250 — buka laci pin 2 (on=50ms, off=500ms)
        ```

        Response: `application/octet-stream`
      parameters:
        - { $ref: '#/components/parameters/TenantId' }
      responses:
        '200':
          description: ESC/POS bytes siap kirim ke printer
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

