  # ═══════════════════════════════════════════════════════════════════════
  # WARMINDO — Order Board & Mark Served
  # ═══════════════════════════════════════════════════════════════════════

  /tenants/{tenant_id}/order-board:
    get:
      tags: [OrderBoard]
      summary: Papan pesanan harian
      description: |
        Mengembalikan semua pesanan hari ini, diurutkan dari yang paling lama masuk.

        **Dirancang untuk layar masak warmindo** — kasir sekaligus masak bisa melihat
        semua pesanan aktif sekaligus dan menandai pesanan yang sudah selesai.

        ### Filter
        - `include_done=true` (default) — tampilkan juga pesanan yang sudah di-serve
        - `include_done=false` — hanya pesanan yang belum selesai
        - `include_cancelled=false` (default) — sembunyikan void/cancelled
        - `date=YYYY-MM-DD` — lihat papan untuk tanggal lain (misal rekap kemarin)

        ### Cara pakai di Android
        1. Panggil endpoint ini saat layar papan pesanan pertama kali dibuka.
        2. Polling setiap 5–10 detik untuk update realtime.
        3. Saat kasir tap "Selesai" pada satu pesanan → `POST /sales/{id}/serve`.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: date
          in: query
          schema:
            type: string
            format: date
            example: '2025-07-15'
          description: Tanggal papan (YYYY-MM-DD). Default hari ini.
        - name: include_done
          in: query
          schema:
            type: boolean
            default: true
          description: Sertakan pesanan yang sudah di-serve.
        - name: include_cancelled
          in: query
          schema:
            type: boolean
            default: false
          description: Sertakan pesanan void/cancelled.
      responses:
        '200':
          description: Daftar pesanan hari ini
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderBoardResponse'
              examples:
                papan_aktif:
                  summary: 'Contoh papan pesanan — 2 aktif, 1 selesai'
                  value:
                    status: success
                    data:
                      - uuid: 'sale-uuid-001'
                        invoice_no: 'INV-20250715-000001'
                        queue_number: 1
                        order_type: dine_in
                        customer_name: 'Meja 2'
                        status: paid
                        created_at: '2025-07-15T03:10:00Z'
                        served_at: null
                        items:
                          - product_name: 'Indomie Goreng'
                            qty: 2
                            note: 'Pedas'
                          - product_name: 'Es Teh Manis'
                            qty: 2
                            note: null
                      - uuid: 'sale-uuid-002'
                        invoice_no: 'INV-20250715-000002'
                        queue_number: 2
                        order_type: takeaway
                        customer_name: null
                        status: held
                        created_at: '2025-07-15T03:15:00Z'
                        served_at: null
                        items:
                          - product_name: 'Mie Ayam Spesial'
                            qty: 1
                            note: 'Kuah dipisah'
                      - uuid: 'sale-uuid-003'
                        invoice_no: 'INV-20250715-000003'
                        queue_number: 3
                        order_type: dine_in
                        customer_name: 'Meja 1'
                        status: paid
                        created_at: '2025-07-15T03:05:00Z'
                        served_at: '2025-07-15T03:12:00Z'
                        items:
                          - product_name: 'Nasi Goreng'
                            qty: 1
                            note: null
        '401': {$ref: '#/components/responses/Unauthorized'}
        '402': {$ref: '#/components/responses/PaymentRequired'}

  /tenants/{tenant_id}/sales/{sale_id}/serve:
    post:
      tags: [OrderBoard]
      summary: Tandai pesanan selesai dimasak & diantar
      description: |
        Mengisi `served_at = sekarang` pada pesanan — menandai bahwa pesanan
        sudah selesai dimasak dan sudah diantar ke pelanggan/meja.

        Hanya berlaku untuk pesanan berstatus `paid` atau `held`.
        Endpoint ini **idempoten** — bisa dipanggil berulang kali (served_at akan diperbarui
        ke timestamp terbaru, tapi tidak ada efek samping lain).

        ### Alur di layar masak warmindo
        1. Kasir/masak selesai membuat pesanan.
        2. Tap tombol "Selesai" → panggil `POST /sales/{id}/serve`.
        3. Kartu pesanan di papan berubah warna / pindah ke bagian "Sudah Selesai".

        ### Catatan
        - Tidak memerlukan request body — cukup POST ke endpoint.
        - Response adalah objek sale lengkap dengan `served_at` yang sudah terisi.
        - Untuk melihat semua pesanan termasuk yang sudah served, gunakan
          `GET /order-board?include_done=true`.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: sale_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID transaksi yang akan di-serve.
      responses:
        '200':
          description: Pesanan berhasil ditandai selesai
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaleResponse'
        '400':
          description: Pesanan tidak bisa di-serve (status void/cancelled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}

  # ═══════════════════════════════════════════════════════════════════════
  # Rekap Shift Real-time
  # ═══════════════════════════════════════════════════════════════════════

  /tenants/{tenant_id}/shifts/current/summary:
    get:
      tags: [Shifts]
      summary: Rekap real-time shift aktif
      description: |
        Mengembalikan ringkasan lengkap shift yang sedang berjalan untuk kasir
        yang sedang login — tanpa perlu tahu UUID shift.

        Identik dengan `GET /shifts/{id}/summary` tapi otomatis pakai shift aktif.
        Mengembalikan 404 jika tidak ada shift yang open.

        **Gunakan ini untuk tombol "Rekap Shift" di Android.**
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Rekap shift aktif
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShiftSummaryResponse'
              examples:
                rekap_berjalan:
                  summary: 'Rekap shift yang masih berjalan — tengah hari'
                  value:
                    status: success
                    data:
                      uuid: 'shift-uuid-001'
                      cashier_name: 'Rina'
                      status: open
                      opened_at: '2025-07-15T01:00:00Z'
                      closed_at: null
                      opening_cash: 200000
                      closing_cash: null
                      expected_cash: null
                      cash_difference: null
                      total_transactions: 12
                      void_transactions: 1
                      gross_total: 485000
                      total_discount: 15000
                      total_tax: 52800
                      net_total: 418000
                      expense_total: 50000
                      payment_breakdown:
                        - payment_method: cash
                          transaction_count: 8
                          total: 310000
                        - payment_method: qris
                          transaction_count: 4
                          total: 175000
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404':
          description: Tidak ada shift yang sedang open

  # ═══════════════════════════════════════════════════════════════════════
  # Notifikasi Stok
  # ═══════════════════════════════════════════════════════════════════════

  /tenants/{tenant_id}/reports/stock-alerts/read-all:
    post:
      tags: [Reports]
      summary: Dismiss semua alert stok sekaligus
      description: |
        Tandai semua alert stok yang belum dibaca sebagai sudah dibaca.
        Cocok untuk tombol "Dismiss semua" di layar notifikasi Android.
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Semua alert berhasil di-dismiss
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string, example: success}
                  message: {type: string}
                  data:
                    type: object
                    properties:
                      dismissed_count:
                        type: integer
                        description: Jumlah alert yang berhasil di-dismiss.
              examples:
                berhasil:
                  summary: '5 alert berhasil di-dismiss'
                  value:
                    status: success
                    message: All alerts marked as read
                    data:
                      dismissed_count: 5
        '401': {$ref: '#/components/responses/Unauthorized'}

  /tenants/{tenant_id}/reports/expiring-batches:
    get:
      tags: [Reports]
      summary: Daftar batch produk yang akan expired
      description: |
        Mengembalikan semua batch (produk dengan `has_expiry = true`) yang akan
        expired dalam beberapa hari ke depan. Cocok untuk:
        - Banner peringatan di layar utama kasir
        - Pengambilan keputusan "jual duluan" oleh pemilik/kasir

        Background job otomatis membuat alert di `pos_stock_alerts` untuk batch
        ini, tapi endpoint ini memberikan detail lengkap (sisa stok, tanggal exact).
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: days
          in: query
          schema:
            type: integer
            default: 7
          description: 'Tampilkan batch yang expired dalam X hari ke depan (default: 7).'
        - name: include_expired
          in: query
          schema:
            type: boolean
            default: true
          description: Sertakan batch yang sudah expired (stok masih > 0).
        - name: page
          in: query
          schema: {type: integer, default: 1, minimum: 1}
          description: Nomor halaman
        - name: limit
          in: query
          schema: {type: integer, default: 50, minimum: 1, maximum: 200}
          description: Jumlah data per halaman (default 50, maks 200)
      responses:
        '200':
          description: Daftar batch yang akan/sudah expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpiringBatchListResponse'
              examples:
                ada_expired:
                  summary: 'Ada batch hampir expired dan sudah expired'
                  value:
                    status: success
                    data:
                      - batch_uuid: 'batch-uuid-001'
                        product_uuid: 'prod-uuid-susu'
                        product_name: 'Susu UHT Full Cream'
                        sku: 'SKU-SUSU-001'
                        quantity_remaining: 12
                        expiry_date: '2025-07-18'
                        days_until_expiry: 3
                      - batch_uuid: 'batch-uuid-002'
                        product_uuid: 'prod-uuid-roti'
                        product_name: 'Roti Tawar'
                        sku: 'SKU-ROTI-001'
                        quantity_remaining: 5
                        expiry_date: '2025-07-13'
                        days_until_expiry: -2
        '401': {$ref: '#/components/responses/Unauthorized'}

  # ═══════════════════════════════════════════════════════════════════════
  # Aturan Diskon Otomatis
  # ═══════════════════════════════════════════════════════════════════════

  /tenants/{tenant_id}/discount-rules:
    get:
      tags: [DiscountRules]
      summary: List semua aturan diskon
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: active_only
          in: query
          schema:
            type: boolean
            default: true
          description: Hanya tampilkan rule aktif.
      responses:
        '200':
          description: Daftar aturan diskon
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscountRuleListResponse'
        '401': {$ref: '#/components/responses/Unauthorized'}
    post:
      tags: [DiscountRules]
      summary: Buat aturan diskon baru
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDiscountRuleInput'
            examples:
              happy_hour:
                summary: Happy Hour 10:00-12:00
                value:
                  name: 'Happy Hour Pagi'
                  rule_type: happy_hour
                  discount_type: pct
                  discount_value: 10
                  start_time: '10:00'
                  end_time: '12:00'
                  applicable_days: [1,2,3,4,5]
              min_purchase:
                summary: Diskon minimum pembelian
                value:
                  name: 'Hemat Rp5000'
                  rule_type: min_purchase
                  discount_type: fixed
                  discount_value: 5000
                  min_purchase_amount: 50000
      responses:
        '200':
          description: Aturan diskon berhasil dibuat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscountRuleResponse'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}

  /tenants/{tenant_id}/discount-rules/preview:
    get:
      tags: [DiscountRules]
      summary: Preview diskon untuk total tertentu
      description: |
        Simulasi diskon yang akan berlaku **sekarang** untuk total belanja tertentu.
        Berguna untuk test rule sebelum diaktifkan — kasir bisa lihat "kalau belanja
        Rp50.000 sekarang, dapat diskon apa?".
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: total
          in: query
          required: true
          schema:
            type: number
            example: 50000
          description: Total belanja sebelum diskon (Rupiah).
      responses:
        '200':
          description: Preview hasil diskon
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscountPreviewResponse'
              examples:
                happy_hour_aktif:
                  summary: 'Happy Hour aktif — diskon 10% dari total Rp 50.000'
                  value:
                    status: success
                    data:
                      applied_rules:
                        - uuid: 'rule-uuid-001'
                          name: 'Happy Hour Pagi'
                          rule_type: happy_hour
                          discount: 5000
                      total_discount: 5000
                      final_total: 45000
                tidak_ada_rule:
                  summary: 'Tidak ada rule yang berlaku'
                  value:
                    status: success
                    data:
                      applied_rules: []
                      total_discount: 0
                      final_total: 50000
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}

  /tenants/{tenant_id}/discount-rules/{rule_id}:
    get:
      tags: [DiscountRules]
      summary: Detail satu aturan diskon
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: rule_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DiscountRuleResponse'}
          description: Detail aturan diskon
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
    patch:
      tags: [DiscountRules]
      summary: Update aturan diskon
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: rule_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateDiscountRuleInput'}
      responses:
        '200':
          content:
            application/json:
              schema: {$ref: '#/components/schemas/DiscountRuleResponse'}
          description: Aturan diskon berhasil diupdate
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      tags: [DiscountRules]
