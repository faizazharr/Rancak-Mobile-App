  # ── Operasional Kasir ──────────────────────────────────────────────────────

  /tenants/{tenant_id}/sales/{id}/move-table:
    post:
      tags: [Sales]
      summary: Pindah meja hold order
      description: |
        Pindahkan hold order ke meja lain.
        - Sale harus berstatus `held`
        - Meja tujuan harus aktif dan tidak sedang dipakai
        - Meja lama di-set `available`, meja baru di-set `occupied`
      parameters:
        - { $ref: '#/components/parameters/TenantId' }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: UUID sale (hold order)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [table_uuid]
              properties:
                table_uuid: { type: string, format: uuid, description: UUID meja tujuan }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          sale_uuid:      { type: string, format: uuid }
                          new_table_uuid: { type: string, format: uuid }

  /tenants/{tenant_id}/sales/{id}/merge:
    post:
      tags: [Sales]
      summary: Gabung dua hold order menjadi satu
      description: |
        Pindahkan semua item dari `source_uuid` ke sale `:id` (target), lalu batalkan source.

        **Syarat:**
        - Kedua sale harus berstatus `held`
        - Kedua sale harus milik tenant yang sama
        - Target dan source tidak boleh sama

        **Efek:**
        - Item source dipindahkan ke target
        - Subtotal & total target di-recalculate
        - Sale source di-set `cancelled`
        - Meja sale source (jika ada) di-bebaskan
      parameters:
        - { $ref: '#/components/parameters/TenantId' }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
          description: UUID sale target (yang menerima item)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_uuid]
              properties:
                source_uuid:
                  type: string
                  format: uuid
                  description: UUID sale sumber yang akan digabung ke target
      responses:
        '200':
          description: OK — mengembalikan sale target yang sudah di-merge
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Sale' }

  /tenants/{tenant_id}/sales/{id}/receipt/queue:
    get:
      tags: [Sales]
      summary: Struk nomor antrian (ESC/POS bytes)
      description: |
        Cetak struk mini berisi nomor antrian saja.
        Cocok untuk printer 58mm — nomor antrian ditampilkan dengan font super besar.

        Response: `application/octet-stream` (raw ESC/POS bytes).
      parameters:
