    PrinterConfig:
      type: object
      properties:
        uuid:             {type: string, format: uuid}
        device_id:        {type: string, example: "android-device-uuid-001"}
        printer_name:     {type: string, example: "Printer Kasir Utama"}
        printer_type:     {type: string, enum: [receipt, kitchen, label]}
        connection_type:  {type: string, enum: [network, bluetooth, usb]}
        address:          {type: string, example: "192.168.1.100:9100"}
        paper_width_mm:   {type: integer, example: 80}
        is_default:       {type: boolean, example: true}
        created_at:       {type: string, format: date-time}

    CreatePrinterConfigInput:
      type: object
      required: [printer_name, printer_type, connection_type, address]
      properties:
        printer_name:
          type: string
          example: "Printer Kasir Utama"
        printer_type:
          type: string
          enum: [receipt, kitchen, label]
          description: Jenis printer — receipt (struk), kitchen (dapur), label
        connection_type:
          type: string
          enum: [network, bluetooth, usb]
          description: Tipe koneksi printer
        address:
          type: string
          description: |
            Alamat printer sesuai connection_type:
            - network: `IP:port` misalnya `192.168.1.100:9100`
            - bluetooth: MAC address misalnya `AA:BB:CC:DD:EE:FF`
            - usb: path device misalnya `/dev/usb/lp0`
        paper_width_mm:
          type: integer
          enum: [58, 80]
          default: 80
          description: Lebar kertas dalam mm
        is_default:
          type: boolean
          default: false
          description: Jadikan printer default untuk type-nya di device ini

    UpdatePrinterConfigInput:
