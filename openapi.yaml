    DiscountRule:
      type: object
      properties:
        uuid: {type: string, format: uuid}
        name: {type: string, example: 'Happy Hour Pagi'}
        description: {type: string, nullable: true}
        rule_type:
          type: string
          enum: [always, happy_hour, min_purchase]
        discount_type:
          type: string
          enum: [pct, fixed]
        discount_value:
          type: number
          description: 'Persen (0-100) jika discount_type=pct, atau nominal Rupiah jika fixed.'
          example: 10
        start_time:
          type: string
          nullable: true
          example: '10:00'
          description: Format HH:MM. Hanya untuk happy_hour.
        end_time:
          type: string
          nullable: true
          example: '12:00'
        applicable_days:
          type: array
          nullable: true
          items: {type: integer}
          description: '0=Minggu, 1=Senin, ... 6=Sabtu. null = setiap hari.'
          example: [1,2,3,4,5]
        min_purchase_amount:
          type: number
          nullable: true
          description: Minimum total belanja. Hanya untuk min_purchase.
          example: 50000
        priority:
          type: integer
          description: Semakin tinggi = lebih diutamakan jika stackable=false.
          example: 10
        stackable:
          type: boolean
          description: 'Bisa ditumpuk dengan rule lain? false = winner-takes-all.'
          example: false
        max_discount:
          type: number
          nullable: true
          description: Batas maksimum nominal diskon (Rupiah). null = tidak ada batas.
        is_active: {type: boolean}
        created_at: {type: string, format: date-time}

    DiscountRuleResponse:
      type: object
      properties:
        status: {type: string, example: success}
        message: {type: string}
        data: {$ref: '#/components/schemas/DiscountRule'}

    DiscountRuleListResponse:
      type: object
      properties:
        status: {type: string, example: success}
        data:
          type: array
          items: {$ref: '#/components/schemas/DiscountRule'}

    CreateDiscountRuleInput:
      type: object
      required: [name, discount_value]
      properties:
        name: {type: string}
        description: {type: string}
        rule_type: {type: string, enum: [always, happy_hour, min_purchase], default: always}
        discount_type: {type: string, enum: [pct, fixed], default: pct}
        discount_value: {type: number}
        start_time: {type: string, description: 'HH:MM. Wajib untuk happy_hour.'}
        end_time: {type: string, description: 'HH:MM. Wajib untuk happy_hour.'}
        applicable_days:
          type: array
          items: {type: integer}
          description: '0=Minggu..6=Sabtu. Kosong/null = setiap hari.'
        min_purchase_amount: {type: number, description: 'Wajib untuk min_purchase.'}
        priority: {type: integer, default: 0}
        stackable: {type: boolean, default: false}
        max_discount: {type: number}
        is_active: {type: boolean, default: true}

    UpdateDiscountRuleInput:
      type: object
      properties:
        name: {type: string}
        description: {type: string}
        rule_type: {type: string, enum: [always, happy_hour, min_purchase]}
        discount_type: {type: string, enum: [pct, fixed]}
        discount_value: {type: number}
        start_time: {type: string}
        end_time: {type: string}
        applicable_days:
          type: array
          items: {type: integer}
        min_purchase_amount: {type: number}
        priority: {type: integer}
        stackable: {type: boolean}
        max_discount: {type: number}
        is_active: {type: boolean}

    DiscountPreviewResponse:
      type: object
