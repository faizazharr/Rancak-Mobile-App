  # ── KDS ───────────────────────────────────────────────────────────────────────

  /tenants/{tenant_id}/kds:
    parameters:
      - { $ref: '#/components/parameters/TenantId' }
    get:
      tags: [KDS]
      summary: Daftar order dapur (polling)
      description: |
        Layar dapur polling endpoint ini setiap beberapa detik.
        Default: tampilkan semua order dengan status `active` (new + cooking + ready).
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [new, cooking, ready, done, active]
            default: active
          description: |
            Filter status. `active` = new + cooking + ready (default).
            Untuk status `done`, gunakan `date` + `page`/`limit` karena data bisa banyak.
        - in: query
          name: date
          schema: {type: string, format: date}
          description: |
            Filter tanggal (YYYY-MM-DD). Default: hari ini.
            Untuk status `active` diabaikan — selalu tampil semua order aktif tanpa filter tanggal.
          example: "2024-01-15"
        - in: query
          name: page
          schema: {type: integer, default: 1, minimum: 1}
          description: Nomor halaman (berlaku terutama untuk status done)
        - in: query
          name: limit
          schema: {type: integer, default: 50, minimum: 1, maximum: 200}
          description: Jumlah data per halaman (default 50, maks 200)
      responses:
        '200': { description: OK }

  /tenants/{tenant_id}/kds/{kds_id}:
    parameters:
      - { $ref: '#/components/parameters/TenantId' }
      - { in: path, name: kds_id, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [KDS]
      summary: Detail satu KDS order
      responses:
        '200': { description: OK }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [KDS]
      summary: Update status order dapur
      description: |
        Jika status di-set ke `done`, semua item ikut di-set `done`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [new, cooking, ready, done]
      responses:
        '200': { description: OK }
        '400': { $ref: '#/components/responses/BadRequest' }

  /tenants/{tenant_id}/kds/{kds_id}/items/{item_id}:
    parameters:
      - { $ref: '#/components/parameters/TenantId' }
      - { in: path, name: kds_id,  required: true, schema: { type: string, format: uuid } }
      - { in: path, name: item_id, required: true, schema: { type: string, format: uuid } }
    patch:
      tags: [KDS]
      summary: Update status item dapur
      description: |
        Status order di-recalculate otomatis setelah item diupdate:
        - Semua done → order done
        - Ada ready, tidak ada cooking/pending → order ready
        - Ada cooking atau ready → order cooking
        - Semua pending → order new
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, cooking, ready, done]
      responses:
        '200': { description: OK }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── ESC/POS Receipt ───────────────────────────────────────────────────────────

  /tenants/{tenant_id}/sales/{sale_id}/receipt/escpos:
    parameters:
      - { $ref: '#/components/parameters/TenantId' }
      - { in: path, name: sale_id, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Sales]
      summary: Download struk kasir dalam format ESC/POS (raw bytes)
      description: |
        Kembalikan raw ESC/POS bytes untuk printer thermal 58mm (kasir).
        `Content-Type: application/octet-stream`

        Client cukup kirim byte stream ini langsung ke port printer:
        - **USB/serial**: tulis ke `/dev/usb/lp0` (Linux) atau COM port (Windows)
        - **Network printer**: kirim ke TCP port 9100
        - **Bluetooth**: kirim via SPP profile

        Sudah include: logo (dengan posisi & ukuran dari receipt-settings), header toko,
        info transaksi, tabel item, ringkasan harga, info pembayaran, footer (dengan
        alignment, ikon IG/FB, info WiFi), dan perintah cut kertas (`GS V 0`).
      responses:
        '200':
          description: Raw ESC/POS bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404': { $ref: '#/components/responses/NotFound' }

  /tenants/{tenant_id}/sales/{sale_id}/receipt/kitchen:
    parameters:
      - { $ref: '#/components/parameters/TenantId' }
      - { in: path, name: sale_id, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Sales]
      summary: Download Kitchen Order Ticket (KOT) dalam format ESC/POS
      description: |
        Kembalikan raw ESC/POS bytes untuk **printer dapur** (Kitchen Order Ticket / KOT).
        `Content-Type: application/octet-stream`

        KOT **hanya berisi** informasi yang dibutuhkan dapur — **tanpa harga**:
        - Header "DAPUR / KITCHEN" + nama toko
        - Tipe order, nomor meja / antrian, nama pelanggan, kasir
        - Daftar item dengan **font double-height** agar mudah dibaca dari jauh
        - Catatan per item (misal: "pedas", "tanpa bawang")
        - Bundle/paket ditampilkan sebagai grup dengan komponen masing-masing
        - Perintah cut kertas di akhir

        **Workflow penggunaan:**
        1. Kasir konfirmasi order (bayar / pay hold)
        2. Android cetak struk kasir via `/receipt/escpos` ke printer kasir
        3. Android cetak KOT via `/receipt/kitchen` ke printer dapur
        4. Dapur proses order berdasarkan KOT

        > Alternatif: gunakan KDS (Kitchen Display System) jika dapur tidak pakai printer.
      responses:
        '200':
          description: Raw ESC/POS bytes untuk printer dapur
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404': { $ref: '#/components/responses/NotFound' }

  /tenants/{tenant_id}/sales/{sale_id}/receipt/combined:
    parameters:
      - { $ref: '#/components/parameters/TenantId' }
      - { in: path, name: sale_id, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [Sales]
      summary: Download KOT + struk kasir digabung dalam satu ESC/POS stream
      description: |
        Menggabungkan **KOT dapur** dan **struk kasir** menjadi satu byte stream ESC/POS.
        Cocok untuk setup **satu printer** yang dipakai bersama kasir dan dapur.

        Setiap bagian diakhiri perintah cut kertas (`GS V 0`) sehingga printer otomatis
        memotong kertas di antara KOT dan struk kasir.

        **Urutan cetak** dikontrol via query param `kot_first`:

        | `kot_first` | Urutan | Kapan digunakan |
        |---|---|---|
        | `true` (default) | KOT → struk kasir | Dapur harus mulai masak secepat mungkin; kasir menyerahkan struk setelahnya |
        | `false` | Struk kasir → KOT | Kasir butuh struk lebih dulu (mis. bayar dulu baru masak) |

        **Setup dua printer (rekomendasi)?** Gunakan endpoint terpisah dan kirim paralel:
        - `/receipt/escpos`  → printer kasir
        - `/receipt/kitchen` → printer dapur
      parameters:
        - in: query
          name: kot_first
          schema:
            type: boolean
            default: true
          description: |
            `true`  → KOT dicetak lebih dulu, lalu struk kasir (default).
            `false` → Struk kasir lebih dulu, lalu KOT.
      responses:
        '200':
          description: Raw ESC/POS bytes — KOT + struk kasir digabung
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404': { $ref: '#/components/responses/NotFound' }

