    UpdateReservationInput:
      type: object
      description: Semua field opsional — hanya field yang dikirim yang akan diupdate.
      properties:
        customer_name:   {type: string}
        customer_phone:  {type: string, nullable: true}
        party_size:      {type: integer, minimum: 1}
        reserved_at:     {type: string, format: date-time}
        duration_minutes: {type: integer, minimum: 1}
        table_uuid:      {type: string, format: uuid, nullable: true}
        note:            {type: string, nullable: true}

    QrPayment:
      type: object
      properties:
        uuid:         {type: string, format: uuid}
        sale_uuid:    {type: string, format: uuid}
        xendit_qr_id:
          type: string
          description: ID QR dari Xendit (qrco_xxx)
          example: "qrco_a1b2c3d4"
        qr_string:
          type: string
          description: |
            Data string QR code untuk dirender menjadi gambar di Android.
            Gunakan library ZXing, QRGen, atau sejenisnya.
          example: "00020101021226580014ID.CO.XENDIT..."
        amount:
          type: number
          description: Jumlah yang harus dibayar (dalam IDR)
          example: 75000
        status:
          type: string
          enum: [pending, succeeded, failed, expired]
          description: |
            Status QR:
            - `pending` — menunggu pembayaran
            - `succeeded` — pembayaran berhasil, sale otomatis ditandai paid
            - `failed` — pembayaran gagal
            - `expired` — QR sudah kedaluwarsa
          example: "pending"
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: Waktu QR kedaluwarsa
        created_at: {type: string, format: date-time}

    XenditWebhookPayload:
      type: object
      description: |
        Payload yang dikirim Xendit ke endpoint webhook.
        Xendit mendukung dua format — wrapper `event+data` (baru) dan flat (lama).
        Backend mendukung keduanya.
      properties:
        event:
          type: string
          example: "qr.payment"
          description: Tipe event dari Xendit
        data:
          type: object
          nullable: true
          description: Data event (format baru)
          properties:
            id:           {type: string, example: "qrco_a1b2c3d4"}
