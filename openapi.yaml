        denominations:
          type: object
          nullable: true
          description: "Breakdown denominasi. Key = nilai pecahan, value = jumlah lembar"
          example: {"100000": 3, "50000": 1}
        note:
          type: string
          nullable: true
          example: "Ada selisih Rp 25.000, sudah dicek kembali"

    Opname:
