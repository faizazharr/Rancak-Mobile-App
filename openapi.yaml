        '401': {$ref: '#/components/responses/Unauthorized'}
    post:
      tags: [Produk86]
      summary: Tandai produk sebagai 86 hari ini
      description: |
        Upsert — jika produk sudah di-86 hari ini, reason akan diupdate.
        Produk yang di-86 tidak bisa dijual sampai besok atau sampai dibatalkan.
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/Mark86Input'}
