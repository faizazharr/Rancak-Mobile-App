// Stability configuration file — digunakan oleh:
//   1. Compose Compiler (composeCompiler.stabilityConfigurationFiles)
//   2. Skydoves Compose Stability Analyzer (composeStabilityAnalyzer.stabilityValidation.stabilityConfigurationFiles)
//
// Format: satu fully-qualified class name per baris.
//   *   = wildcard satu level    (com.example.*)
//   **  = wildcard semua level   (com.example.**)
//
// Tambahkan tipe eksternal yang secara praktis immutable tapi tidak dianotasi
// @Stable/@Immutable oleh library mereka, agar Compose tidak menandainya "unstable".

// ── Kotlinx DateTime ─────────────────────────────────────────────────────────
// Semua merupakan value class / data class immutable — aman dianggap stable.
kotlinx.datetime.Instant
kotlinx.datetime.LocalDate
kotlinx.datetime.LocalDateTime
kotlinx.datetime.LocalTime
kotlinx.datetime.TimeZone
kotlinx.datetime.FixedOffsetTimeZone
kotlinx.datetime.UtcOffset
kotlinx.datetime.DateTimePeriod
kotlinx.datetime.DatePeriod
kotlinx.datetime.DayOfWeek
kotlinx.datetime.Month

// ── Kotlinx Immutable Collections ────────────────────────────────────────────
kotlinx.collections.immutable.ImmutableList
kotlinx.collections.immutable.ImmutableSet
kotlinx.collections.immutable.ImmutableMap
kotlinx.collections.immutable.PersistentList
kotlinx.collections.immutable.PersistentSet
kotlinx.collections.immutable.PersistentMap

// ── AndroidX Navigation ───────────────────────────────────────────────────────
// NavHostController is a stable singleton created by rememberNavController().
// Its internal state uses Compose snapshot state, so it's safe to treat as stable.
androidx.navigation.NavHostController

// ── AndroidX Lifecycle ────────────────────────────────────────────────────────
// ViewModel instances are passed into Screen composables only via koinViewModel()
// default param — the reference never changes across recompositions.
// Screen composables are navigation entry points, so non-skippable is acceptable,
// but marking all project ViewModels stable suppresses the false-positive warning.
id.rancak.app.presentation.viewmodel.**
